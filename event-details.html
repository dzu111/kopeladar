<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Details | KOPELADAR</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        /* Specific Styles for Event Template */
        .event-info-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 100px;
        }
        .event-info-item {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            margin-bottom: 25px;
        }
        .event-info-item:last-child {
            margin-bottom: 0;
        }
        .event-info-icon {
            width: 45px;
            height: 45px;
            background: var(--accent, #f39c12); 
            color: var(--primary-dark, #022c22);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 1.1rem;
            flex-shrink: 0;
        }
        .event-info-text h4 {
            font-size: 1rem;
            margin-bottom: 5px;
            font-family: 'Montserrat', sans-serif;
        }
        .event-info-text p {
            font-size: 0.95rem;
            color: var(--gray-dark, #555);
            margin: 0;
        }

        /* Swiper Slider Styles */
        .media-slider-section {
            background-color: #f8f9fa; 
        }
        .swiper-slide {
            border-radius: 15px;
            overflow: hidden;
            aspect-ratio: 16/9; 
            background: #000;
        }
        .swiper-slide img, .swiper-slide video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .swiper-button-next, .swiper-button-prev {
            color: var(--accent, #f39c12);
        }
        .swiper-pagination-bullet-active {
            background: var(--accent, #f39c12);
        }
    </style>
</head>

<body class="loading">

    <div id="reading-progress" style="position: fixed; top: 0; left: 0; height: 4px; background: var(--accent, #f39c12); width: 0%; z-index: 9999; transition: width 0.1s ease-out;"></div>

    <div id="scroll-progress"></div>
    <div id="custom-cursor" class="custom-cursor"></div>
    <div id="cursor-follower" class="cursor-follower"></div>

    <div id="preloader">
        <div class="svg-loader-wrap">
            <svg class="svg-logo-draw" viewBox="0 0 400 100">
                <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle">KOPELADAR</text>
            </svg>
        </div>
    </div>

    <div id="navbar-placeholder"></div>

    <section class="internal-hero" id="event-hero"
        style="background: linear-gradient(rgba(2, 44, 34, 0.8), rgba(2, 44, 34, 0.8)), url('img/shell_station_premium.png') no-repeat center center/cover;">
        <div class="container">
            <div class="hero-content" data-aos="fade-up">
                <h6 class="sub-title" id="event-category">CORPORATE EVENT</h6>
                <h1 id="event-title">Loading Event...</h1>
                <p id="event-desc">Please wait while we fetch the event details.</p>
            </div>
        </div>
    </section>

    <section class="section-padding">
        <div class="container">
            <div class="row" style="align-items: flex-start;">
                
                <div class="col-8" data-aos="fade-right">
                    <div class="about-text" id="event-body" style="font-size: 1.1rem; color: var(--gray-dark); line-height: 1.8;">
                        <h2 class="masked-header mb-4"><span class="reveal-text">Event Overview</span></h2>
                        <p><i class="fas fa-spinner fa-spin"></i> Loading content...</p>
                    </div>

                    <div class="share-bar mt-5 pt-4" style="border-top: 1px solid #eee;">
                        <h5 style="font-size: 1rem; margin-bottom: 15px; color: var(--primary-dark);">Share this event</h5>
                        <div style="display: flex; gap: 10px;">
                            <a href="#" onclick="window.open('https://api.whatsapp.com/send?text=' + encodeURIComponent(window.location.href)); return false;" style="width: 40px; height: 40px; border-radius: 50%; background: #25D366; color: white; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 1.2rem;"><i class="fab fa-whatsapp"></i></a>
                            
                            <a href="#" onclick="window.open('https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(window.location.href)); return false;" style="width: 40px; height: 40px; border-radius: 50%; background: #1877F2; color: white; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 1.2rem;"><i class="fab fa-facebook-f"></i></a>
                            
                            <button onclick="navigator.clipboard.writeText(window.location.href); alert('Link copied to clipboard!');" style="width: 40px; height: 40px; border-radius: 50%; background: #f8f9fa; color: var(--primary-dark); display: flex; align-items: center; justify-content: center; border: 1px solid #ddd; cursor: pointer; font-size: 1.1rem; transition: 0.3s;"><i class="fas fa-link"></i></button>
                        </div>
                    </div>
                </div>

                <div class="col-4" data-aos="fade-left">
                    <div class="event-info-card">
                        <h3 style="margin-bottom: 25px; font-size: 1.4rem;">Event Details</h3>
                        
                        <div class="event-info-item">
                            <div class="event-info-icon"><i class="fas fa-calendar-alt"></i></div>
                            <div class="event-info-text">
                                <h4>Date</h4>
                                <p id="event-date">TBD</p>
                            </div>
                        </div>

                        <div class="event-info-item">
                            <div class="event-info-icon"><i class="fas fa-clock"></i></div>
                            <div class="event-info-text">
                                <h4>Time</h4>
                                <p id="event-time">TBD</p>
                            </div>
                        </div>

                        <div class="event-info-item">
                            <div class="event-info-icon"><i class="fas fa-map-marker-alt"></i></div>
                            <div class="event-info-text">
                                <h4>Location</h4>
                                <p id="event-location">TBD</p>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <section class="section-padding media-slider-section">
        <div class="container">
            <div class="section-header text-center mb-5" data-aos="fade-up">
                <h2 class="masked-header"><span class="reveal-text">Event Gallery</span></h2>
                <p style="color: var(--gray-dark);">Highlights and captures from the event.</p>
            </div>

            <div class="swiper event-gallery-swiper" data-aos="fade-up" data-aos-delay="100">
                <div class="swiper-wrapper" id="event-media-container">
                    </div>
                <div class="swiper-pagination"></div>
                <div class="swiper-button-prev"></div>
                <div class="swiper-button-next"></div>
            </div>

        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
    <script src="main.js"></script>

    <script>
        // 1. Reading Progress Bar Logic
        window.addEventListener('scroll', () => {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            const progressBar = document.getElementById('reading-progress');
            if (progressBar) progressBar.style.width = scrolled + '%';
        });

        // 2. Fetch Partials (Navbar & Footer)
        const fetchPartials = async () => {
            const nav = await fetch('navbar.html').then(r => r.text());
            const foot = await fetch('footer.html').then(r => r.text());
            document.getElementById('navbar-placeholder').innerHTML = nav;
            document.getElementById('footer-placeholder').innerHTML = foot;
            if (typeof initNavbarFeatures === 'function') initNavbarFeatures();
        };
        fetchPartials();

        // 3. DECAP CMS DATA INJECTION
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const eventId = params.get('id'); // e.g., ?id=2026-03-24-mesyuarat

            if (!eventId) {
                document.getElementById('event-title').innerText = "Event Not Found";
                document.getElementById('event-desc').innerText = "Please return to the homepage to see our latest events.";
                document.getElementById('event-body').innerHTML = "<p>No event ID provided.</p>";
                return;
            }

            // Fetch the specific JSON file from GitHub/Cloudflare
            fetch(`data/events/${eventId}.json`)
                .then(response => {
                    if (!response.ok) throw new Error('Event file not found');
                    return response.json();
                })
                .then(data => {
                    // Update Core Text Elements
                    document.title = `${data.title} | KOPELADAR`;
                    document.getElementById('event-title').innerText = data.title;
                    document.getElementById('event-desc').innerText = data.description || '';
                    
                    // Format Date nicely
                    const eventDate = new Date(data.date).toLocaleDateString('en-MY', { day: 'numeric', month: 'long', year: 'numeric' });
                    document.getElementById('event-date').innerText = eventDate;

                    // DEFENSIVE CHECK: Time & Location
                    const timeRow = document.getElementById('event-time').closest('.event-info-item');
                    if (data.time) {
                        document.getElementById('event-time').innerText = data.time;
                    } else if (timeRow) {
                        timeRow.style.display = 'none'; 
                    }

                    const locationRow = document.getElementById('event-location').closest('.event-info-item');
                    if (data.location) {
                        document.getElementById('event-location').innerText = data.location;
                    } else if (locationRow) {
                        locationRow.style.display = 'none';
                    }

                    // Update Hero Background Image
                    if (data.image) {
                        const hero = document.getElementById('event-hero');
                        hero.style.background = `linear-gradient(rgba(2, 44, 34, 0.8), rgba(2, 44, 34, 0.8)), url('${data.image}') no-repeat center center/cover`;
                    }

                    // Parse Markdown Body to HTML
                    if (data.body) {
                        const bodyHeader = '<h2 class="masked-header mb-4"><span class="reveal-text">Event Overview</span></h2>';
                        document.getElementById('event-body').innerHTML = bodyHeader + marked.parse(data.body);
                    }

                    // DEFENSIVE CHECK: Dynamic Gallery & Swiper
                    const gallerySection = document.querySelector('.media-slider-section');
                    const swiperWrapper = document.getElementById('event-media-container');
                    
                    if (data.gallery && data.gallery.length > 0) {
                        swiperWrapper.innerHTML = ''; // Clear out loading state
                        
                        // Loop through uploaded photos and create slides
                        data.gallery.forEach(item => {
                            if (item.photo) {
                                swiperWrapper.innerHTML += `
                                    <div class="swiper-slide">
                                        <img src="${item.photo}" alt="Event Gallery Image">
                                    </div>
                                `;
                            }
                        });

                        // Make Swiper "Smart": Only loop if there is more than 1 image
                        const shouldLoop = data.gallery.length > 1;
                        
                        new Swiper('.event-gallery-swiper', {
                            slidesPerView: 1,
                            spaceBetween: 30,
                            loop: shouldLoop,
                            navigation: {
                                nextEl: '.swiper-button-next',
                                prevEl: '.swiper-button-prev',
                            },
                            pagination: {
                                el: '.swiper-pagination',
                                clickable: true,
                            },
                            breakpoints: {
                                768: {
                                    slidesPerView: 1.2,
                                    centeredSlides: true,
                                }
                            }
                        });
                    } else {
                        // If 0 images were uploaded, hide the gallery section
                        if (gallerySection) gallerySection.style.display = 'none';
                    }
                })
                .catch(err => {
                    console.error("Error fetching event:", err);
                    document.getElementById('event-title').innerText = "Event Not Found";
                    document.getElementById('event-desc').innerText = "This event may have been removed or the link is incorrect.";
                    document.getElementById('event-body').innerHTML = "<p>Could not load the event details.</p>";
                });
        });
    </script>
</body>
</html>
